---
name: Deploy DoughDistrict
on:
  push:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Docker Deploy
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE"
          docker compose up -d --build --remove-orphans
          docker system prune -f
