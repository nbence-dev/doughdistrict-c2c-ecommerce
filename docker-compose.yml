services:
  dough-app:
    # Changed name to keep it simple and consistent
    container_name: dough-app
    build: .
    restart: always
    ports:
      - "80:80"
    env_file: .env
    volumes:
      - ./public:/var/www/html/public
      - ./src:/var/www/html/src
    depends_on:
      dough-db:
        condition: service_healthy
    networks:
      - dough-internal
    environment:
      DB_HOST: dough-db
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_CDN_URL: ${R2_CDN_URL}

  dough-db:
    container_name: dough-db
    image: mysql:8.0
    restart: unless-stopped
    networks:
      - dough-internal
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./sql/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASS}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: dough-pma
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: dough-db
      PMA_PORT: 3306
    depends_on:
      dough-db:
        condition: service_healthy
    networks:
      - dough-internal

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: dough-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    depends_on:
      - dough-app
    networks:
      - dough-internal
    profiles:
      - tunnel

networks:
  # Internal network so the app can talk to MySQL safely
  dough-internal:
    driver: bridge

volumes:
  db_data:
