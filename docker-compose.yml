services:
  dough-app:
    # Changed name to keep it simple and consistent
    container_name: dough-app
    build: .
    env_file: .env
    volumes:
      - ./public:/var/www/html/public
      - ./src:/var/www/html/src
    depends_on:
      - dough-db
    networks:
      - dough-internal
    environment:
      DB_HOST: dough-db
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}

  dough-db:
    container_name: dough-db
    image: mysql:8.0
    restart: unless-stopped
    networks:
      - dough-internal
    environment:
          MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  # Dedicated tunnel for DoughDistrict
  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: dough-tunnel
    restart: unless-stopped
    # PHP apps usually listen on port 80 inside the container
    command: tunnel --no-autoupdate --url http://dough-app:80
    networks:
      - dough-internal

networks:
  # Internal network so the app can talk to MySQL safely
  dough-internal:
    driver: bridge

volumes:
  db_data:
